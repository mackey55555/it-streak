name: OTA Update (Production)

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'constants/**'
      - 'hooks/**'
      - 'lib/**'
      - 'types/**'
      - 'assets/**'
      - 'package.json'

jobs:
  ota_update:
    type: update
    params:
      branch: production
      platform: ios
      message: "OTA: ${{ github.event.head_commit.message }}"
